dataset: era5
year0: 1941
yearn: 2023
nyears: 500
kimg: 300
antecedent_buffer_days:
longitude:
  min: 80.0
  max: 95.75
latitude:
  min: 10.25
  max: 26.0
exclude:
  - "1952-05-09"
  - "1992-04-15"
  - "1997-05-16"
  - "2008-05-04"
  - "1992-05-25"
  - "1997-05-24"
  - "1995-05-02"
resolution:
  lon: 64
  lat: 64
sfunc: additive
rfunc: # in r_utils/rfuncs.R
  args:
    - ws
  func: max
  desc: maximum wind speed
rfuncs_dir: src/funcs.R
event_subset:
  do: True
  field: [ws]
  value: 15 # subjective
  func: max
marginal_threshold: 0.95
domain: gumbel
fields:
  ws:
    init:
      func: wind_speed
      args: [u10, v10]
    hfunc:
      func: max
      args: [ws]
    obj: max
    distn: genpareto
    two_tailed: False
    title: "10 m wind speed"
    units: "m/s"
    cmap: "cmocean.cm.speed"
  tp:
    init:
      func: identity
      args: [tp]
    hfunc:
      func: sum
      args: [tp]
    obj: max
    distn: genpareto
    units: "m" # same as kg p m-2
    cmap: "cmo.cm.rain"
    title: "total precipitation"
  msl:
    init:
      func: identity
      args: [msl]
    hfunc:
      func: min
      args: [msl]
    obj: min
    distn: genpareto
    units: "Pa"
    cmap: "YlOrRd"
    title: "Mean Sea Level Pressure"
points_of_interest: # (lon, lat)
  # bangladesh
  chittagong:
    - 91.8466
    - 22.3569
  dhaka:
    - 90.4125
    - 23.8103
  # noaa_buoys
  buoy_23223:
    - 89.483
    - 17.333
  buoy_23218:
    - 88.5
    - 10.165
  buoy_23008:
    - 90.0
    - 12.0
  buoy_23007:
    - 90.0
    - 8.0
local_crs: 24346 # https://epsg.io/24346

