dataset: era5

# year range (1940 to 2023)
year0: 1941
yearn: 2023
nyears: 500
# geographical boundaries (15.75° x 15.75°)
longitude:
  min: 80.0
  max: 95.75
latitude:
  min: 10.25
  max: 26.0

# specific dates to exclude (based-on scripts/windbombs.py)
exclude:
  - "1952-05-09"
  - "1992-04-15"
  - "1997-05-16"
  - "2008-05-04"
  - "1992-05-25"
  - "1997-05-24"
  - "1995-05-02"

# resolution
resolution:
  lon: 64
  lat: 64

sfunc: additive # in r_utils/sfuncs.R

rfunc: # in r_utils/rfuncs.R
  args:
    - ws
  func: max # https://www.rdocumentation.org/packages/base/versions/3.6.2/topics/match.fun
rfuncs_dir: src/funcs.R
# event threshold 
event_subset:
  do: True
  field: ws
  value: 15 # subjective
  func: max

# marginal threshold (for POT)
marginal_threshold: 0.95

# training probability space
domain: gumbel

kimg: 300

# output fields
fields:
  ws:
    args:
      - u10
      - v10
    func: wind_speed # defined in py_utils/funcs.py
    hfunc: max # must be xarray compatible
    obj: max
    distn: genpareto #! weibull is incorrect, need XIMIS
    units: "mps"
    cmap: "viridis"
    title: "Wind Speed"
  tp:
    args:
      - tp
    func: identity
    hfunc: sum
    obj: max
    distn: genpareto
    units: "m" # same as kg p m-2
    cmap: "PuBu"
    title: "Total Precipitation"
  msl:
    args:
      - msl
    func: identity
    hfunc: min
    obj: min
    distn: genpareto
    units: "Pa"
    cmap: "YlOrRd"
    title: "Mean Sea Level Pressure"

points_of_interest: # (lon, lat)
  # bangladesh
  chittagong:
    - 91.8466
    - 22.3569
  dhaka:
    - 90.4125
    - 23.8103
  # noaa_buoys
  buoy_23223:
    - 89.483
    - 17.333
  buoy_23218:
    - 88.5
    - 10.165
  buoy_23008:
    - 90.0
    - 12.0
  buoy_23007:
    - 90.0
    - 8.0


local_crs: 24346 # https://epsg.io/24346

